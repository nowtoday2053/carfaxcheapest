<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credits Added — CheapCarfax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <nav class="navbar scrolled" id="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="nav-brand">
        <svg class="nav-logo" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h1a2 2 0 0 0 2-2v-1h8v1a2 2 0 0 0 2 2h1a1 1 0 0 0 1-1v-4l-2.3-6.1A2 2 0 0 0 15.8 4H8.2a2 2 0 0 0-1.9 1.3L4 11v5a1 1 0 0 0 1 1z"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/></svg>
        CheapCarfax
      </a>
      <div class="nav-links" id="navLinks">
        <a href="how.html">How to Use</a>
        <a href="pricing.html">Pricing</a>
        <a href="faq.html">FAQ</a>
        <a href="reviews.html">Reviews</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <section style="padding-top: calc(56px + 3rem); padding-bottom: 3rem;">
    <div class="container" style="max-width: 520px;">
      <div id="creditResult" style="text-align: center; padding: 3rem 0;">
        <div class="spinner" style="width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; margin: 0 auto 1rem; animation: spin 0.7s linear infinite;"></div>
        <p style="color: #6b7280;">Verifying your purchase...</p>
      </div>
    </div>
  </section>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }

    .credit-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .credit-card .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #f0fdf4;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }
    .credit-card h2 {
      font-size: 1.375rem;
      font-weight: 800;
      margin-bottom: 0.35rem;
    }
    .credit-card .sub {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 1.75rem;
    }
    .credit-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2rem;
    }
    .credit-stat {
      text-align: center;
    }
    .credit-stat .num {
      font-size: 2rem;
      font-weight: 800;
      color: #111827;
    }
    .credit-stat .label {
      font-size: 0.75rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .credit-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
    }
  </style>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var sessionId = params.get('session_id');
      var container = document.getElementById('creditResult');

      if (!sessionId) {
        showError('No session found.');
        return;
      }

      fetch('/api/verify-credits?session_id=' + encodeURIComponent(sessionId))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.success) {
            showSuccess(data.credits_added, data.total_credits);
          } else {
            showError(data.error || 'Could not verify purchase.');
          }
        })
        .catch(function () {
          showError('Network error. Please refresh.');
        });

      function showError(msg) {
        container.innerHTML =
          '<div class="credit-card">' +
            '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" style="margin:0 auto 1rem;display:block;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' +
            '<h2>Something went wrong</h2>' +
            '<p class="sub">' + msg + '</p>' +
            '<a href="pricing.html" class="btn btn-primary">Back to Pricing</a>' +
          '</div>';
      }

      function showSuccess(added, total) {
        container.innerHTML =
          '<div class="credit-card">' +
            '<div class="icon-wrap">' +
              '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="16 10 11 15 8 12"/></svg>' +
            '</div>' +
            '<h2>Credits added!</h2>' +
            '<p class="sub">Your report credits have been added to your account.</p>' +
            '<div class="credit-stats">' +
              '<div class="credit-stat"><div class="num">+' + added + '</div><div class="label">Added</div></div>' +
              '<div class="credit-stat"><div class="num">' + total + '</div><div class="label">Total Balance</div></div>' +
            '</div>' +
            '<div class="credit-actions">' +
              '<a href="index.html#lookup" class="btn btn-primary">Use a Credit</a>' +
              '<a href="dashboard.html" class="btn btn-outline">My Reports</a>' +
            '</div>' +
          '</div>';
      }
    })();
  </script>

  <script src="script.js" defer></script>
</body>
</html>
