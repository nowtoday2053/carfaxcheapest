<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Report — CheapCarfax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
  <script defer data-website-id="dfid_CMcM2wVtO2BkyShL2NQwB" data-domain="carfaxcheapest.com" src="https://datafa.st/js/script.js"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="nav-brand">
        <svg class="nav-logo" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h1a2 2 0 0 0 2-2v-1h8v1a2 2 0 0 0 2 2h1a1 1 0 0 0 1-1v-4l-2.3-6.1A2 2 0 0 0 15.8 4H8.2a2 2 0 0 0-1.9 1.3L4 11v5a1 1 0 0 0 1 1z"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/></svg>
        CheapCarfax
      </a>
      <div class="nav-links" id="navLinks">
        <a href="how.html">How to Use</a>
        <a href="pricing.html">Pricing</a>
        <a href="faq.html">FAQ</a>
        <a href="reviews.html">Reviews</a>
        <a href="support.html">Support</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- REPORT CONTENT -->
  <section style="padding-top: calc(56px + 1.5rem);">
    <div id="reportContainer" style="max-width: 960px; margin: 0 auto; padding: 0 1rem;">
      <div style="text-align: center; padding: 4rem 0;">
        <div class="spinner" style="width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; margin: 0 auto 1rem; animation: spin 0.7s linear infinite;"></div>
        <p style="color: #6b7280; font-size: 0.95rem;">Loading your vehicle history report...</p>
      </div>
    </div>
  </section>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .report-dl-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .report-success-banner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .report-success-banner svg { flex-shrink: 0; }
    .report-success-banner h3 { font-size: 1rem; color: #111827; margin-bottom: 0.1rem; }
    .report-success-banner p { font-size: 0.8125rem; color: #6b7280; margin: 0; }

    .report-frame {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }
    .report-frame iframe {
      width: 100%;
      min-height: 80vh;
      border: none;
      display: block;
    }

    .report-actions {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .report-dl-btn, .report-print-btn, .report-share-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.9375rem;
      font-weight: 700;
      padding: 0.75rem 1.375rem;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      text-decoration: none;
    }
    .report-dl-btn {
      background: #2563eb;
      color: #fff;
      box-shadow: 0 4px 14px rgba(37,99,235,0.3);
    }
    .report-dl-btn:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(37,99,235,0.4);
    }
    .report-print-btn {
      background: #fff;
      color: #111827;
      border-color: #e5e7eb;
    }
    .report-print-btn:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }
    .report-share-btn {
      background: #fff;
      color: #111827;
      border-color: #e5e7eb;
    }
    .report-share-btn:hover { background: #f9fafb; border-color: #d1d5db; }
    .report-share-btn.copied { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }

    .report-error {
      text-align: center;
      padding: 3rem 0;
    }
    .report-error h3 { font-size: 1.125rem; margin: 0.75rem 0 0.35rem; }
    .report-error p { color: #6b7280; margin-bottom: 1.25rem; }
  </style>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var sessionId = params.get('session_id');
      var container = document.getElementById('reportContainer');

      if (!sessionId) {
        showError('No session found. Please start from the homepage.');
        return;
      }

      fetch('/api/report?session_id=' + encodeURIComponent(sessionId))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.success && data.data) {
            renderReport(data.data);
          } else if (data.error === 'Payment not completed') {
            showError('Payment was not completed. Please try again.');
          } else {
            showError(data.error || 'Could not load your report.');
          }
        })
        .catch(function () {
          showError('Network error. Please refresh the page.');
        });

      function showError(msg) {
        container.innerHTML =
          '<div class="report-error">' +
            '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' +
            '<h3>Something went wrong</h3>' +
            '<p>' + msg + '</p>' +
            '<a href="index.html" class="btn btn-primary">Back to Homepage</a>' +
          '</div>';
      }

      function downloadReport(htmlContent, vin) {
        var printWin = window.open('', '_blank', 'width=900,height=700');
        if (!printWin) {
          alert('Please allow popups for this site, then try again.');
          return;
        }
        // Inject print-trigger script so PDF dialog opens automatically
        var injected = htmlContent.replace('</body>',
          '<script>window.onload=function(){window.print();}<\/script></body>'
        );
        printWin.document.write(injected);
        printWin.document.close();
      }

      function renderReport(d) {
        var html = '';

        // Success banner
        html += '<div class="report-success-banner">' +
          '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="16 10 11 15 8 12"/></svg>' +
          '<div><h3>Payment successful</h3><p>Your full vehicle history report for VIN ' + (d.vin || '') + ' is ready.</p></div>' +
        '</div>';

        // Download + Print + Share action bar
        if (d.html_content) {
          var pdfUrl   = d.shareToken ? '/shared/' + d.shareToken + '/raw' : null;
          var shareUrl = d.shareToken ? window.location.origin + '/shared/' + d.shareToken : null;

          html += '<div class="report-actions">';

          if (pdfUrl) {
            html += '<a class="btn btn-primary report-dl-btn" href="' + pdfUrl + '" target="_blank">' +
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
              'Download as PDF</a>';
          } else {
            html += '<button class="btn btn-primary report-dl-btn" id="downloadBtn">' +
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
              'Download as PDF</button>';
          }

          html += '<button class="btn btn-outline report-print-btn" id="printBtn">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>' +
            'Print Report</button>';

          if (shareUrl) {
            html += '<button class="btn btn-outline report-share-btn" id="shareBtn" data-url="' + shareUrl + '">' +
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>' +
              '<span id="shareText">Share Link</span></button>';
          }

          html += '</div>';

          html += '<div class="report-frame">' +
            '<iframe id="reportFrame" sandbox="allow-same-origin" title="Vehicle History Report"></iframe>' +
          '</div>';

          container.innerHTML = html;

          // Wire up download button (fallback if no shareToken)
          var dlBtn = document.getElementById('downloadBtn');
          if (dlBtn) {
            dlBtn.addEventListener('click', function () {
              downloadReport(d.html_content, d.vin);
            });
          }

          // Wire up print button
          document.getElementById('printBtn').addEventListener('click', function () {
            var iframe = document.getElementById('reportFrame');
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
          });

          // Wire up share button
          var shareBtn = document.getElementById('shareBtn');
          if (shareBtn) {
            shareBtn.addEventListener('click', function () {
              var url = this.getAttribute('data-url');
              navigator.clipboard.writeText(url).then(function () {
                shareBtn.classList.add('copied');
                document.getElementById('shareText').textContent = 'Copied!';
                setTimeout(function () {
                  shareBtn.classList.remove('copied');
                  document.getElementById('shareText').textContent = 'Share Link';
                }, 2500);
              }).catch(function () { prompt('Copy this shareable link:', url); });
            });
          }

          // Write the HTML content into the iframe
          var iframe = document.getElementById('reportFrame');
          var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
          iframeDoc.open();
          iframeDoc.write(d.html_content);
          iframeDoc.close();

          // Auto-resize iframe to fit content
          function resizeIframe() {
            try {
              var h = iframeDoc.documentElement.scrollHeight || iframeDoc.body.scrollHeight;
              if (h > 200) iframe.style.height = h + 'px';
            } catch (e) {}
          }
          iframe.onload = resizeIframe;
          setTimeout(resizeIframe, 500);
          setTimeout(resizeIframe, 1500);
          setTimeout(resizeIframe, 3000);
        } else {
          showError('Report data is empty. Please contact support.');
        }
      }
    })();
  </script>

  <script src="script.js" defer></script>
</body>
</html>
